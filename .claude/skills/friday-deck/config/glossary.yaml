# 脱専門用語の言い換え辞書 (report-deck)
# 依頼者(非エンジニア)向けに、専門用語・固有技術名・略語を一般語へ言い換えるための対訳。
# エージェントが報告スライド生成時に参照し、辞書に無い語は言い換えを決めてここに追記して育てる。
#
# 形式:
#   - term:    元の語(表記ゆれは aliases に)
#     say:     言い換え(依頼者に伝わる一般語)
#     aliases: [別表記, ...]   # 任意
#
# 注意: 直訳で意味が壊れる語は、文脈ごとに say を調整するか、ユーザーに確認する。

terms:
  - term: ログイン認証
    say: ログインの仕組み
    aliases: [認証, 認証基盤, ログイン機能]
  - term: デプロイ
    say: 公開・利用できる状態にすること
    aliases: [リリース, 本番反映]
  - term: ビルド
    say: 動かせる形に組み上げること
  - term: API
    say: 外部サービスと情報をやり取りする仕組み
  - term: データベース
    say: 情報を保存しておく場所
    aliases: [DB, スキーマ]
  - term: バグ
    say: 不具合
    aliases: [障害, エラー]
  - term: リファクタリング
    say: 動きを変えずに内部を整理する作業
  - term: マイグレーション
    say: 保存先の構成を作り直す作業
  - term: フロントエンド
    say: 利用者が見る画面側
  - term: バックエンド
    say: 裏側で処理を行う仕組み
  - term: 3D表示
    say: 立体で見られる表示
    aliases: [3Dビューア, レンダリング]
