# 誤変換辞書（giziroku Phase C で使う）
# 音声文字起こしで壊れがちな固有語・専門語を「正しい表記」に補正するための辞書。
# ★プロジェクト横断で共有・蓄積する資産。ユーザーが訂正した誤変換を都度ここに追記し、
#   回を重ねるほど補正精度が上がる（自己進化）。
#
# 使い方:
#   - from に文字起こしに出る誤表記（ゆれを複数書いてよい / 配列）、to に正しい表記。
#   - note は補正の根拠メモ（任意）。補正メモの妥当性確認に使う。
#   - 固有名（顧客名・人名・社内システム名）が混じりうるため、このファイル自体は
#     公開対象から外す前提で扱う（masking.md と同じ運用）。
#
# 注意: 文脈依存の補正（同じ音でも会議で意味が変わる語）は機械置換せず、
#       LLM が文脈を見て判断する。ここは「ほぼ常にこう直す」固定ゆれを中心に置く。

terms:
  - from: ["船だね", "船種だね", "フラ種", "船田"]
    to: "船種"
    note: "船舶の種類。サンプル 06-22 会議の頻出誤変換"
  - from: ["クラウドフォーメーション"]
    to: "CloudFormation"
    note: "AWS IaC。CFn テンプレートの文脈"
  - from: ["クラウドフロント"]
    to: "CloudFront"
    note: "AWS CDN"
  - from: ["インファレンス"]
    to: "inference"
    note: "推論。AI 挙動の文脈"
  - from: ["ハルシネーション"]
    to: "ハルシネーション"
    note: "正表記。捏造ではなく『一部の数値誤り/引用ずれ』を指す文脈に注意"
  - from: ["プロンプトインジェクション", "フロントインジェクション"]
    to: "プロンプトインジェクション"
    note: "攻撃手法。『フロントインジェクション』は誤変換"
  - from: ["BM 脆弱性診断", "BM脆弱性診断"]
    to: "BM 脆弱性診断"
    note: "正表記（社内固有の診断名。external 時は要マスキング検討）"
