# 参加者名簿の【シード（雛形）】— giziroku スキル同梱・git 追跡対象。
#
# ★名簿は実名（機密）を含むため、雛形は空にしておく。
#   実データ（自己進化で蓄積する名簿）は git 管理外の
#   `giziroku/config/roster.yaml` に置く。
#   `giziroku/config/roster.yaml` が無い場合は、このファイルをコピーして初期化する。
#
# 形式（実データ側で使う）:
#   people:
#     - name: ""        # 氏名・呼称
#       role: ""        # 役割（PM / 実装 / 広報窓口 / 報告先 など）
#       aliases: []     # 文字起こしに出やすい表記ゆれ・呼びかけ・誤変換
#       context: []     # よく出る案件・話題（話者推定の手がかり）

people: []
