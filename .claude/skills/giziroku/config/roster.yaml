# 参加者名簿（giziroku Phase B の候補に使う）
# 過去の議事録で確定した参加者を蓄積し、次回の話者マッピング（Speaker N → 誰）の
# 候補として提示するための名簿。
# ★プロジェクト横断で共有・蓄積する資産。Phase B でユーザーが確定したマッピングを追記する。
#
# 使い方:
#   - name : 氏名（または呼称）。external 公開時は masking.md に従い伏字化する。
#   - role : 役割（PM / 実装 / 広報窓口 / 報告先 など）。
#   - aliases : 文字起こしに出やすい表記ゆれ・呼びかけ（話者推定の手がかり）。
#   - context : よく出る案件・話題（誰の発言か当てる手がかり / 任意）。
#
# ★機密注意: このファイルは固有名（個人名）を含むため、公開対象から外す前提で扱う。
#   共有はするが git 管理外の運用（giziroku/ と同様）を想定。

people: []
