# 誤変換辞書の【シード（雛形）】— giziroku スキル同梱・git 追跡対象。
#
# ★これは初期値の雛形であり、実運用の蓄積先ではない。
#   実データ（自己進化で追記していく辞書）は git 管理外の
#   `giziroku/config/glossary.yaml` に置く（機密・固有語を含みうるため）。
#   `giziroku/config/glossary.yaml` が無い場合は、このファイルをコピーして初期化する。
#
# ここには「どの案件でも汎用的に通じる誤変換」だけを置く。
# 顧客名・人名・社内固有の診断名/サービス名などの機密語は置かない（実データ側に追記する）。
#
# 形式は glossary.yaml と同じ（from: 配列, to: 正表記, note: 根拠メモ）。

terms:
  - from: ["クラウドフォーメーション"]
    to: "CloudFormation"
    note: "AWS IaC"
  - from: ["クラウドフロント"]
    to: "CloudFront"
    note: "AWS CDN"
  - from: ["インファレンス"]
    to: "inference"
    note: "推論。AI 挙動の文脈"
  - from: ["ハルシネーション"]
    to: "ハルシネーション"
    note: "正表記。捏造ではなく『一部の数値誤り/引用ずれ』を指す文脈に注意"
  - from: ["フロントインジェクション"]
    to: "プロンプトインジェクション"
    note: "攻撃手法の誤変換"
